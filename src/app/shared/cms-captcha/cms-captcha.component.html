<div class="content captcha-section">
  <div class="row">
    <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12">
      <div class="captcha-group">
        <div class="captcha-image-wrapper">
          <img
            [src]="captchaModel.image"
            class="captcha-image"
            alt="کپچا"
            (click)="onRefresh()"
          />
          <button
            type="button"
            class="captcha-refresh-icon-button"
            aria-label="تغییر تصویر امنیتی"
            (click)="onRefresh(); $event.stopPropagation()"
          >
            ⟳
          </button>
        </div>
      </div>
    </div>
    <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12">
      <ng-otp-input
        [config]="config || otpConfig"
        (onInputChange)="onInputChange($event)"
        [removeInput]="removeInputOTP"
      ></ng-otp-input>
    </div>
  </div>
</div>
