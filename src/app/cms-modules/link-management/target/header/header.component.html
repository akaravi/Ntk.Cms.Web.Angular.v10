<div class="card card-style loader-container">
  <app-progress-spinner [optionsInfoAreaId]="constructorInfoAreaId">
  </app-progress-spinner>
  <div class="content">
    <div class="table cms-lm-target-header">
      <div class="tr">
        <div class="td small-width">
          <span
            class="svg-icon svg-icon-3x svg-icon-primary"
            [inlineSVG]="'./assets/media/svg/icons/Communication/Flag.svg'"
          ></span>
        </div>
        <div class="td large-width">
          <h5 class="mb-1">
            {{ "TITLE.Selected_TARGET" | translate }}
          </h5>
        </div>
        <div class="td"></div>
      </div>

      <div class="tr" *ngIf="optionTargetId > 0">
        <div class="td small-width">
          {{
            targetFieldsInfo["id"]?.fieldTitle || ("ACTION.ID_Code" | translate)
          }}
          :
        </div>
        <div class="td large-width">
          {{ targetResult?.item?.id }}
        </div>
        <div class="td"></div>
        <div style="clear: both"></div>
      </div>
      <div class="tr" *ngIf="optionTargetId > 0">
        <div class="td small-width">
          {{
            targetFieldsInfo["title"]?.fieldTitle || ("TITLE.Title" | translate)
          }}
          :
        </div>
        <div class="td large-width">
          {{ targetResult?.item?.title }}
        </div>
        <div class="td"></div>
        <div style="clear: both"></div>
      </div>
    </div>
  </div>
</div>
<div class="divider divider-margins"></div>
